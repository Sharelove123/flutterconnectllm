name: flutterconnectllm
description: "Minimal Flutter app to load and run an LLM locally on-device using RunAnywhere SDK."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # RunAnywhere SDK packages (from pub.dev)
  runanywhere: 0.16.0
  runanywhere_llamacpp: 0.16.0

  # State management (matching multivendoreccommerce pattern)
  flutter_riverpod: ^2.5.1

  # Routing (matching multivendoreccommerce pattern)
  go_router: ^14.2.0

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1

dependency_overrides:
  runanywhere:
    path: third_party/runanywhere

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
